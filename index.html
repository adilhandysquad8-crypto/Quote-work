<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Handy sQuad — Field Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-900: #042C53;
      --blue-800: #0C447C;
      --blue-700: #185FA5;
      --blue-600: #1976D2;
      --blue-500: #2196F3;
      --blue-400: #64B5F6;
      --blue-100: #BBDEFB;
      --blue-50:  #E3F2FD;
      --white: #ffffff;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
      --gray-900: #0F172A;
      --green-50: #F0FDF4; --green-700: #15803D; --green-100: #DCFCE7;
      --amber-50: #FFFBEB; --amber-700: #B45309; --amber-100: #FEF3C7;
      --red-50:   #FFF1F2; --red-700:   #BE123C; --red-100:   #FFE4E6;
      --purple-50:#FAF5FF; --purple-700:#7E22CE; --purple-100:#F3E8FF;
      --sidebar-width: 240px;
      --topbar-height: 60px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 14px; line-height: 1.5; }

    /* ─── AUTH SCREEN ──────────────────────────────────────────── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue-700) 50%, var(--blue-500) 100%);
      position: relative;
      overflow: hidden;
    }
    #auth-screen::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -200px; right: -150px;
    }
    #auth-screen::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      bottom: -100px; left: -100px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 48px 44px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 48px; height: 48px;
      background: var(--blue-800);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 18px; font-weight: 500;
      color: var(--white);
      letter-spacing: -2px;
    }
    .auth-logo-text h1 { font-size: 22px; font-weight: 600; color: var(--gray-900); letter-spacing: -0.5px; }
    .auth-logo-text p { font-size: 12px; color: var(--gray-400); margin-top: 1px; }
    .auth-title { font-size: 18px; font-weight: 600; color: var(--gray-800); margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; letter-spacing: 0.3px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      background: var(--white);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .form-input:focus { border-color: var(--blue-600); box-shadow: 0 0 0 3px var(--blue-50); }
    .form-input::placeholder { color: var(--gray-300); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--blue-800);
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: var(--blue-900); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; transform: none; }
    .auth-error {
      background: var(--red-50);
      border: 1px solid var(--red-100);
      color: var(--red-700);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-divider { text-align: center; font-size: 12px; color: var(--gray-400); margin: 24px 0 0; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── APP SHELL ────────────────────────────────────────────── */
    #app { display: none; height: 100vh; overflow: hidden; }
    #app.visible { display: flex; }

    /* ─── SIDEBAR ──────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--blue-900);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .sidebar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
      pointer-events: none;
    }
    .sidebar-brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 12px;
    }
    .brand-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 14px; font-weight: 500; color: white;
      letter-spacing: -1px;
      flex-shrink: 0;
    }
    .brand-text .name { font-size: 15px; font-weight: 600; color: white; }
    .brand-text .tagline { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; letter-spacing: 0.4px; }
    .sidebar-user {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--blue-600);
      color: white;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 10px; color: rgba(255,255,255,0.45); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .nav-section-label {
      padding: 12px 20px 4px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 400;
      border-left: 3px solid transparent;
      transition: all var(--transition);
      position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--blue-400); font-weight: 500; }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: #EF5350;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }
    .nav-badge.warn { background: #F59E0B; }
    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
    }
    .btn-logout {
      width: 100%;
      padding: 9px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: rgba(255,255,255,0.6);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-logout:hover { background: rgba(239,83,80,0.2); border-color: rgba(239,83,80,0.3); color: #EF9A9A; }

    /* ─── MAIN CONTENT ─────────────────────────────────────────── */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar {
      height: var(--topbar-height);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
    }
    .page-title { font-size: 16px; font-weight: 600; color: var(--gray-800); }
    .topbar-spacer { flex: 1; }
    .topbar-role-pill {
      background: var(--blue-50);
      color: var(--blue-800);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--blue-100);
    }

    /* ─── PAGE CONTENT ─────────────────────────────────────────── */
    .page-content { flex: 1; overflow-y: auto; padding: 24px; }
    .page-content::-webkit-scrollbar { width: 5px; }
    .page-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

    /* ─── STATS GRID ───────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .stat-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-label { font-size: 11px; font-weight: 500; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 600; color: var(--gray-900); line-height: 1; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    .stat-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; gap: 4px; }
    .badge-up { background: var(--green-100); color: var(--green-700); }
    .badge-warn { background: var(--amber-100); color: var(--amber-700); }
    .badge-info { background: var(--blue-50); color: var(--blue-800); }
    .badge-danger { background: var(--red-100); color: var(--red-700); }

    /* ─── CARDS ────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--gray-700); }
    .card-body { padding: 20px; }
    .card-link { font-size: 12px; color: var(--blue-600); cursor: pointer; font-weight: 500; }
    .card-link:hover { color: var(--blue-800); }

    /* ─── TWO COLUMN LAYOUT ────────────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 16px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 900px) { .two-col, .three-col { grid-template-columns: 1fr; } }

    /* ─── JOB LIST ─────────────────────────────────────────────── */
    .job-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background var(--transition);
    }
    .job-item:last-child { border-bottom: none; }
    .job-item:hover { background: var(--blue-50); }
    .job-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .job-info { flex: 1; min-width: 0; }
    .job-name { font-size: 13px; font-weight: 500; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .job-status { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 10px; flex-shrink: 0; }
    .status-active   { background: var(--green-100); color: var(--green-700); }
    .status-pending  { background: var(--amber-100); color: var(--amber-700); }
    .status-review   { background: var(--blue-50); color: var(--blue-800); }
    .status-done     { background: var(--purple-100); color: var(--purple-700); }
    .status-rework   { background: var(--red-100); color: var(--red-700); }

    /* ─── PROGRESS BAR ─────────────────────────────────────────── */
    .progress-bar { height: 4px; background: var(--gray-100); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; background: var(--blue-600); border-radius: 2px; transition: width 0.6s ease; }

    /* ─── ACTIVITY FEED ────────────────────────────────────────── */
    .activity-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .activity-text { font-size: 12px; color: var(--gray-600); line-height: 1.5; }
    .activity-time { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    /* ─── QUICK ACTIONS ────────────────────────────────────────── */
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .qa-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      transition: all var(--transition);
    }
    .qa-btn:hover { border-color: var(--blue-400); background: var(--blue-50); color: var(--blue-800); }
    .qa-icon { font-size: 16px; }

    /* ─── STATUS TIMELINE ──────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-item { display: flex; gap: 12px; align-items: flex-start; }
    .tl-track { display: flex; flex-direction: column; align-items: center; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; flex-shrink: 0; margin-top: 2px; }
    .tl-line { width: 2px; flex: 1; min-height: 20px; margin: 2px 0; }
    .tl-content { padding-bottom: 16px; flex: 1; }
    .tl-label { font-size: 13px; font-weight: 500; }
    .tl-sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .tl-done .tl-dot { background: var(--green-700); border-color: var(--green-700); }
    .tl-done .tl-line { background: var(--green-700); }
    .tl-done .tl-label { color: var(--gray-700); }
    .tl-active .tl-dot { background: var(--white); border-color: var(--blue-600); }
    .tl-active .tl-line { background: var(--gray-200); }
    .tl-active .tl-label { color: var(--blue-800); font-weight: 600; }
    .tl-pending .tl-dot { background: var(--white); border-color: var(--gray-300); }
    .tl-pending .tl-line { background: var(--gray-200); }
    .tl-pending .tl-label { color: var(--gray-400); }

    /* ─── FINANCE BOXES ────────────────────────────────────────── */
    .finance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .finance-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 12px 14px; }
    .finance-label { font-size: 10px; font-weight: 500; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .finance-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .fv-blue { color: var(--blue-700); }
    .fv-red { color: #BE123C; }
    .fv-green { color: #15803D; }

    /* ─── EXPENSE ITEMS ────────────────────────────────────────── */
    .expense-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .expense-item:last-child { border-bottom: none; }
    .exp-cat { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
    .exp-mat { background: var(--blue-50); color: var(--blue-800); }
    .exp-lab { background: var(--green-100); color: var(--green-700); }
    .exp-oth { background: var(--amber-100); color: var(--amber-700); }
    .exp-name { flex: 1; font-size: 12px; color: var(--gray-700); }
    .exp-amt { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gray-800); }
    .exp-status { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
    .exp-pend { background: var(--amber-100); color: var(--amber-700); }
    .exp-appr { background: var(--green-100); color: var(--green-700); }
    .exp-rej  { background: var(--red-100); color: var(--red-700); }

    /* ─── PAYMENT ROWS ─────────────────────────────────────────── */
    .payment-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
    .payment-row:last-child { border-bottom: none; }
    .pay-type { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
    .pay-adv { background: var(--blue-50); color: var(--blue-800); }
    .pay-fin { background: var(--green-100); color: var(--green-700); }
    .pay-info { flex: 1; min-width: 0; }
    .pay-name { font-size: 12px; font-weight: 500; color: var(--gray-800); }
    .pay-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
    .pay-amount { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gray-800); margin-right: 8px; }
    .btn-sm {
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid;
      transition: all var(--transition);
      background: transparent;
    }
    .btn-verify { border-color: var(--blue-600); color: var(--blue-600); }
    .btn-verify:hover { background: var(--blue-600); color: white; }
    .btn-reject { border-color: #BE123C; color: #BE123C; }
    .btn-reject:hover { background: #BE123C; color: white; }
    .btn-approve { border-color: var(--green-700); color: var(--green-700); }
    .btn-approve:hover { background: var(--green-700); color: white; }

    /* ─── FORMS ────────────────────────────────────────────────── */
    .form-section { margin-bottom: 24px; }
    .form-section-title { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row-single { margin-bottom: 14px; }
    .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      background: var(--white);
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .form-select:focus { border-color: var(--blue-600); }
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      background: var(--white);
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color var(--transition);
    }
    .form-textarea:focus { border-color: var(--blue-600); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 16px; border-top: 1px solid var(--gray-100); margin-top: 16px; }
    .btn-cancel {
      padding: 9px 20px;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-cancel:hover { background: var(--gray-50); border-color: var(--gray-300); }
    .btn-submit {
      padding: 9px 24px;
      background: var(--blue-800);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-submit:hover { background: var(--blue-900); }

    /* ─── MODAL ────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(16px) scale(0.98); } to { opacity:1; transform:none; } }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--gray-800); }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      color: var(--gray-500);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all var(--transition);
    }
    .modal-close:hover { background: var(--gray-200); color: var(--gray-700); }
    .modal-body { padding: 24px; }

    /* ─── TOAST ────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--gray-900);
      color: white;
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.3s ease;
      min-width: 240px;
    }
    .toast.success { background: #15803D; }
    .toast.error { background: #BE123C; }
    @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

    /* ─── EMPTY STATE ──────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: var(--gray-400);
      gap: 8px;
    }
    .empty-icon { font-size: 36px; }
    .empty-text { font-size: 13px; }

    /* ─── REWORK / ADVANCE ROWS ────────────────────────────────── */
    .rework-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
    .rework-item:last-child { border-bottom: none; }
    .rework-info { flex: 1; min-width: 0; }
    .rework-name { font-size: 13px; font-weight: 500; color: var(--gray-800); }
    .rework-reason { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .rework-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }

    /* ─── PROFIT CHART PLACEHOLDER ─────────────────────────────── */
    .profit-bars { display: flex; align-items: flex-end; gap: 8px; height: 80px; padding-top: 8px; }
    .profit-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .profit-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--blue-100); min-height: 6px; transition: height 0.5s ease; }
    .profit-bar.highlighted { background: var(--blue-600); }
    .profit-bar-label { font-size: 10px; color: var(--gray-400); }

    /* ─── LOCATION BADGE ───────────────────────────────────────── */
    .loc-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--blue-50); color: var(--blue-700);
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
      border: 1px solid var(--blue-100);
    }

    /* ─── LOADING STATE ────────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      flex-direction: column;
      gap: 14px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--blue-100);
      border-top-color: var(--blue-700);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 13px; color: var(--gray-500); }

    /* ─── MOBILE SIDEBAR TOGGLE ────────────────────────────────── */
    .mobile-menu-btn { display: none; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -var(--sidebar-width); z-index: 200; height: 100vh; transition: left var(--transition); }
      .sidebar.open { left: 0; }
      .mobile-menu-btn { display: flex; }
      .two-col { grid-template-columns: 1fr; }
    }

    /* ─── MISC ─────────────────────────────────────────────────── */
    .section-gap { margin-bottom: 16px; }
    .text-sm { font-size: 12px; }
    .text-muted { color: var(--gray-500); }
    .text-bold { font-weight: 600; }
    .mt-4 { margin-top: 4px; }
    .flex-row { display: flex; align-items: center; gap: 8px; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--gray-500); text-align: left; padding: 8px 12px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); text-transform: uppercase; letter-spacing: 0.4px; }
    td { font-size: 13px; color: var(--gray-700); padding: 10px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--blue-50); }
    .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--gray-200); }
  </style>
</head>
<body>

<!-- ─── LOADING ──────────────────────────────────────────────── -->
<div class="loading-overlay" id="loading-overlay">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
    <div style="width:36px;height:36px;background:var(--blue-800);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:white;letter-spacing:-1px;">HS</div>
    <span style="font-size:18px;font-weight:600;color:var(--gray-800);">Handy sQuad</span>
  </div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to system...</div>
</div>

<!-- ─── AUTH SCREEN ──────────────────────────────────────────── -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">HS</div>
      <div class="auth-logo-text">
        <h1>Handy sQuad</h1>
        <p>Field Management System</p>
      </div>
    </div>
    <div class="auth-title">Welcome back</div>
    <p class="auth-sub">Sign in to access your dashboard</p>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="login-email" placeholder="you@handysquad.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span id="login-btn-text">Sign In</span>
    </button>
    <div class="auth-divider">Secured by Supabase · Handy sQuad v1.0</div>
  </div>
</div>

<!-- ─── APP SHELL ─────────────────────────────────────────────── -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">HS</div>
      <div class="brand-text">
        <div class="name">Handy sQuad</div>
        <div class="tagline">Field Management</div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">--</div>
      <div class="user-info">
        <div class="user-name" id="sb-name">Loading...</div>
        <div class="user-role" id="sb-role">--</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- injected by JS -->
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="handleLogout()">&#8592; Sign Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="topbar">
      <span class="page-title" id="topbar-title">Dashboard</span>
      <div class="topbar-spacer"></div>
      <span class="topbar-role-pill" id="topbar-role">--</span>
    </div>
    <div class="page-content" id="page-content">
      <!-- injected by JS -->
    </div>
  </div>
</div>

<!-- ─── MODAL ────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Form</span>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- injected -->
    </div>
  </div>
</div>

<!-- ─── TOAST ────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ─── SCRIPTS ──────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=9"></script>
</body>
</html>
